<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">rinzler@grid — neofetch</title>
  <desc id="desc">Security Researcher. CVE triage, malware reverse engineering, threat intel.</desc>

  <defs>
    <linearGradient id="emblem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
