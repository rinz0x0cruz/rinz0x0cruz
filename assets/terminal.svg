      .val    { fill: #c0caf5; }
      .cyan   { fill: #bb9af7; }
      .muted  { fill: #565f89; }
      .cursor { fill: #7aa2f7; animation: blink 1.05s steps(1) infinite; }
      @keyframes blink { 0%,50% { opacity: 1 } 50.01%,100% { opacity: 0 } }
    </style>
  </defs>

