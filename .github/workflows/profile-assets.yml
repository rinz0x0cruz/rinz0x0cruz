name: profile-assets

# Generates the animated contribution snake + the 3D isometric contribution
# calendar, then publishes both as static SVGs to the `output` branch.
# The images live in this repo, so they render even if the generator services
# go down. Nothing here runs on the profile's critical path.

on:
  schedule:
    - cron: "0 4 * * *" # daily, ~04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Contribution snake — Tokyo Night: cyan snake, blue->purple dot ramp.
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#7dcfff&color_dots=#24283b,#3b4261,#7aa2f7,#9d7cd8,#bb9af7

      # 3D isometric contribution calendar (dark "night view").
      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Assemble assets (fresh dir avoids the root-owned snake dir)
        run: |
          mkdir -p public
          sudo cp dist/github-snake.svg public/github-snake.svg
          sudo cp profile-3d-contrib/profile-night-view.svg public/profile-3d.svg
          sudo chmod -R a+rX public

      - name: Publish assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: public
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Self-hosted trophy: render ryo-ma's trophy to a static SVG in CI (pinned
  # commit) and publish to the `trophy` branch. No runtime dependency on the
  # (now paywalled) trophy service. Own job/branch so a hiccup never touches
  # the snake/3D assets, and the last good SVG persists.
  trophy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Render trophy SVG (pinned generator)
        env:
          GITHUB_TOKEN1: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN2: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://github.com/ryo-ma/github-profile-trophy.git /tmp/trophy
          cd /tmp/trophy
          git checkout ccb591b887775ee567c0d9a38424ddfb9b1906c4
          cp "$GITHUB_WORKSPACE/.github/scripts/trophy_render.ts" ./trophy_render.ts
          mkdir -p "$GITHUB_WORKSPACE/out"
          deno run --allow-net --allow-env --allow-read --allow-write --no-check \
            trophy_render.ts "${{ github.repository_owner }}" "$GITHUB_WORKSPACE/out/trophy.svg" tokyonight

      - name: Publish trophy to trophy branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: trophy
          build_dir: out
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
